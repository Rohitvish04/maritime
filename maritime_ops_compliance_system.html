
<!DOCTYPE html>
<html>
<head>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --navy: #0a1628;
    --navy2: #0f2040;
    --navy3: #162d52;
    --steel: #1e3a5f;
    --steel2: #2a4d72;
    --ocean: #1a6b8a;
    --cyan: #00b4d8;
    --cyan2: #48cae4;
    --gold: #f4a261;
    --gold2: #e76f51;
    --green: #2ec4b6;
    --red: #e63946;
    --amber: #fb8500;
    --text: #e8f4f8;
    --text2: #8bb8cc;
    --text3: #4a7a92;
    --border: rgba(0,180,216,0.15);
    --border2: rgba(0,180,216,0.3);
    --font-display: 'Bebas Neue', sans-serif;
    --font-mono: 'IBM Plex Mono', monospace;
    --font-body: 'IBM Plex Sans', sans-serif;
  }

  body {
    background: var(--navy);
    color: var(--text);
    font-family: var(--font-body);
    min-height: 100vh;
    overflow-x: hidden;
  }

  .app { display: flex; min-height: 100vh; }

  /* Sidebar */
  .sidebar {
    width: 220px;
    background: var(--navy2);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
    position: sticky;
    top: 0;
    height: 100vh;
  }

  .logo {
    padding: 20px 16px;
    border-bottom: 1px solid var(--border);
  }
  .logo-title {
    font-family: var(--font-display);
    font-size: 22px;
    letter-spacing: 2px;
    color: var(--cyan);
    line-height: 1;
  }
  .logo-sub {
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--text3);
    margin-top: 3px;
    text-transform: uppercase;
    font-family: var(--font-mono);
  }

  .nav { flex: 1; padding: 12px 0; }
  .nav-section {
    padding: 6px 16px 4px;
    font-size: 9px;
    letter-spacing: 3px;
    color: var(--text3);
    text-transform: uppercase;
    font-family: var(--font-mono);
  }
  .nav-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 16px;
    cursor: pointer;
    font-size: 13px;
    color: var(--text2);
    border-left: 2px solid transparent;
    transition: all 0.15s;
  }
  .nav-item:hover { background: rgba(0,180,216,0.07); color: var(--text); }
  .nav-item.active {
    background: rgba(0,180,216,0.12);
    color: var(--cyan);
    border-left-color: var(--cyan);
    font-weight: 500;
  }
  .nav-icon { font-size: 16px; width: 18px; }

  .role-badge {
    margin: 12px 16px;
    padding: 8px 12px;
    background: rgba(244,162,97,0.1);
    border: 1px solid rgba(244,162,97,0.2);
    border-radius: 6px;
  }
  .role-label { font-size: 9px; letter-spacing: 2px; color: var(--gold); font-family: var(--font-mono); text-transform: uppercase; }
  .role-name { font-size: 13px; color: var(--text); margin-top: 2px; font-weight: 500; }
  .role-toggle { font-size: 10px; color: var(--text3); cursor: pointer; margin-top: 4px; }
  .role-toggle:hover { color: var(--cyan); }

  /* Main content */
  .main { flex: 1; overflow-y: auto; background: var(--navy); }

  .topbar {
    background: var(--navy2);
    border-bottom: 1px solid var(--border);
    padding: 14px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .page-title {
    font-family: var(--font-display);
    font-size: 20px;
    letter-spacing: 2px;
    color: var(--text);
  }
  .topbar-right { display: flex; align-items: center; gap: 12px; }
  .badge-alert {
    background: rgba(230,57,70,0.15);
    border: 1px solid rgba(230,57,70,0.3);
    color: var(--red);
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 4px;
    font-family: var(--font-mono);
    cursor: pointer;
  }
  .btn {
    padding: 8px 16px;
    border-radius: 6px;
    font-size: 13px;
    cursor: pointer;
    font-family: var(--font-body);
    font-weight: 500;
    border: none;
    transition: all 0.15s;
  }
  .btn-primary {
    background: var(--cyan);
    color: var(--navy);
  }
  .btn-primary:hover { background: var(--cyan2); }
  .btn-ghost {
    background: transparent;
    color: var(--text2);
    border: 1px solid var(--border2);
  }
  .btn-ghost:hover { background: rgba(0,180,216,0.08); color: var(--text); }
  .btn-danger {
    background: rgba(230,57,70,0.15);
    color: var(--red);
    border: 1px solid rgba(230,57,70,0.3);
  }
  .btn-success {
    background: rgba(46,196,182,0.15);
    color: var(--green);
    border: 1px solid rgba(46,196,182,0.3);
  }
  .btn-sm { padding: 5px 10px; font-size: 11px; }

  .content { padding: 24px; }

  /* KPI cards */
  .kpi-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 24px; }
  .kpi-card {
    background: var(--navy2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
    position: relative;
    overflow: hidden;
  }
  .kpi-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
  }
  .kpi-green::before { background: var(--green); }
  .kpi-red::before { background: var(--red); }
  .kpi-amber::before { background: var(--amber); }
  .kpi-cyan::before { background: var(--cyan); }

  .kpi-label { font-size: 10px; letter-spacing: 2px; color: var(--text3); text-transform: uppercase; font-family: var(--font-mono); }
  .kpi-value { font-family: var(--font-display); font-size: 36px; letter-spacing: 1px; margin: 4px 0 2px; }
  .kpi-green .kpi-value { color: var(--green); }
  .kpi-red .kpi-value { color: var(--red); }
  .kpi-amber .kpi-value { color: var(--amber); }
  .kpi-cyan .kpi-value { color: var(--cyan); }
  .kpi-sub { font-size: 11px; color: var(--text3); }

  /* Tables */
  .panel {
    background: var(--navy2);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    margin-bottom: 20px;
  }
  .panel-header {
    padding: 14px 18px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .panel-title {
    font-family: var(--font-mono);
    font-size: 12px;
    letter-spacing: 2px;
    color: var(--cyan);
    text-transform: uppercase;
  }
  .panel-body { overflow-x: auto; }

  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead th {
    padding: 10px 16px;
    text-align: left;
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--text3);
    font-family: var(--font-mono);
    text-transform: uppercase;
    background: rgba(255,255,255,0.02);
    border-bottom: 1px solid var(--border);
  }
  tbody tr { border-bottom: 1px solid rgba(255,255,255,0.04); transition: background 0.1s; }
  tbody tr:hover { background: rgba(0,180,216,0.05); }
  tbody td { padding: 12px 16px; color: var(--text2); }
  .td-primary { color: var(--text) !important; font-weight: 500; }

  /* Status pills */
  .pill {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 3px 9px;
    border-radius: 4px;
    font-size: 11px;
    font-family: var(--font-mono);
    font-weight: 500;
    white-space: nowrap;
  }
  .pill-dot { width: 5px; height: 5px; border-radius: 50%; }
  .pill-green { background: rgba(46,196,182,0.12); color: var(--green); }
  .pill-green .pill-dot { background: var(--green); }
  .pill-red { background: rgba(230,57,70,0.12); color: var(--red); }
  .pill-red .pill-dot { background: var(--red); }
  .pill-amber { background: rgba(251,133,0,0.12); color: var(--amber); }
  .pill-amber .pill-dot { background: var(--amber); }
  .pill-blue { background: rgba(0,180,216,0.12); color: var(--cyan); }
  .pill-blue .pill-dot { background: var(--cyan); }
  .pill-gray { background: rgba(255,255,255,0.06); color: var(--text3); }

  /* Progress bar */
  .progress-wrap { display: flex; align-items: center; gap: 10px; }
  .progress-bar { flex: 1; height: 4px; background: rgba(255,255,255,0.08); border-radius: 2px; overflow: hidden; min-width: 60px; }
  .progress-fill { height: 100%; border-radius: 2px; transition: width 0.3s; }
  .progress-pct { font-size: 12px; font-family: var(--font-mono); color: var(--text2); min-width: 34px; text-align: right; }

  /* Forms */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    padding: 20px;
  }
  .modal {
    background: var(--navy2);
    border: 1px solid var(--border2);
    border-radius: 10px;
    width: 100%;
    max-width: 520px;
    max-height: 85vh;
    overflow-y: auto;
  }
  .modal-header {
    padding: 18px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .modal-title { font-family: var(--font-display); font-size: 18px; letter-spacing: 1px; color: var(--cyan); }
  .modal-body { padding: 20px; }
  .modal-footer {
    padding: 14px 20px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 10px;
    justify-content: flex-end;
  }

  .form-group { margin-bottom: 16px; }
  .form-label { display: block; font-size: 11px; letter-spacing: 1.5px; color: var(--text3); text-transform: uppercase; font-family: var(--font-mono); margin-bottom: 6px; }
  .form-input, .form-select, .form-textarea {
    width: 100%;
    background: var(--navy);
    border: 1px solid var(--border2);
    border-radius: 6px;
    padding: 9px 12px;
    color: var(--text);
    font-family: var(--font-body);
    font-size: 13px;
    outline: none;
    transition: border-color 0.15s;
  }
  .form-input:focus, .form-select:focus, .form-textarea:focus {
    border-color: var(--cyan);
  }
  .form-select option { background: var(--navy2); }
  .form-textarea { resize: vertical; min-height: 80px; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  /* Grid layout */
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }

  /* Ship card */
  .ship-card {
    background: var(--navy2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 18px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .ship-card:hover { border-color: var(--border2); background: var(--steel); }
  .ship-name { font-family: var(--font-display); font-size: 18px; letter-spacing: 1px; color: var(--text); }
  .ship-meta { font-size: 11px; color: var(--text3); font-family: var(--font-mono); margin-top: 3px; }
  .ship-stats { margin-top: 14px; display: flex; flex-direction: column; gap: 8px; }
  .ship-stat-row { display: flex; justify-content: space-between; align-items: center; font-size: 12px; }
  .ship-stat-label { color: var(--text3); }

  /* Compliance ring */
  .compliance-ring { position: relative; display: inline-flex; align-items: center; justify-content: center; }
  .compliance-text { position: absolute; text-align: center; }
  .compliance-pct { font-family: var(--font-display); font-size: 22px; line-height: 1; }
  .compliance-lbl { font-size: 9px; color: var(--text3); letter-spacing: 1px; font-family: var(--font-mono); }

  /* Alert items */
  .alert-item {
    padding: 12px 16px;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    display: flex;
    align-items: flex-start;
    gap: 12px;
  }
  .alert-item:last-child { border-bottom: none; }
  .alert-icon-wrap {
    width: 32px;
    height: 32px;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    font-size: 15px;
  }
  .alert-critical { background: rgba(230,57,70,0.15); }
  .alert-warning { background: rgba(251,133,0,0.12); }
  .alert-info { background: rgba(0,180,216,0.1); }
  .alert-title { font-size: 13px; color: var(--text); font-weight: 500; }
  .alert-desc { font-size: 11px; color: var(--text3); margin-top: 2px; }
  .alert-time { font-size: 10px; color: var(--text3); font-family: var(--font-mono); margin-top: 4px; }

  /* Timeline */
  .timeline { padding: 4px 0; }
  .tl-item { display: flex; gap: 14px; padding: 0 16px 16px; }
  .tl-line { display: flex; flex-direction: column; align-items: center; }
  .tl-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; margin-top: 4px; }
  .tl-connector { flex: 1; width: 1px; background: var(--border); margin-top: 4px; }
  .tl-content { flex: 1; padding-bottom: 4px; }
  .tl-title { font-size: 13px; color: var(--text); font-weight: 500; }
  .tl-meta { font-size: 11px; color: var(--text3); font-family: var(--font-mono); margin-top: 2px; }

  /* Search/filter bar */
  .filter-bar { display: flex; gap: 10px; margin-bottom: 18px; align-items: center; }
  .search-input {
    flex: 1;
    background: var(--navy2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 14px;
    color: var(--text);
    font-family: var(--font-body);
    font-size: 13px;
    outline: none;
  }
  .search-input:focus { border-color: var(--border2); }
  .filter-select {
    background: var(--navy2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 12px;
    color: var(--text2);
    font-size: 13px;
    outline: none;
    cursor: pointer;
  }
  .filter-select option { background: var(--navy2); }

  /* Crew participation */
  .crew-row { display: flex; align-items: center; gap: 12px; padding: 10px 16px; border-bottom: 1px solid rgba(255,255,255,0.04); }
  .crew-avatar {
    width: 32px; height: 32px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 600; flex-shrink: 0;
    font-family: var(--font-mono);
  }
  .crew-name { font-size: 13px; color: var(--text); font-weight: 500; }
  .crew-role { font-size: 11px; color: var(--text3); font-family: var(--font-mono); }
  .crew-actions { margin-left: auto; display: flex; gap: 6px; }

  /* Tabs */
  .tabs { display: flex; gap: 2px; margin-bottom: 20px; border-bottom: 1px solid var(--border); }
  .tab {
    padding: 10px 18px;
    font-size: 13px;
    color: var(--text3);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    transition: all 0.15s;
    font-family: var(--font-mono);
    letter-spacing: 0.5px;
  }
  .tab:hover { color: var(--text2); }
  .tab.active { color: var(--cyan); border-bottom-color: var(--cyan); }

  /* Risk indicator */
  .risk-bar { display: flex; gap: 2px; margin: 12px 0; }
  .risk-seg { height: 6px; border-radius: 2px; flex: 1; }

  /* Summary stats row */
  .stats-row { display: flex; gap: 1px; background: var(--border); border-radius: 6px; overflow: hidden; margin-bottom: 20px; }
  .stat-seg { flex: 1; background: var(--navy2); padding: 12px 16px; text-align: center; }
  .stat-seg-val { font-family: var(--font-display); font-size: 24px; color: var(--text); }
  .stat-seg-lbl { font-size: 10px; color: var(--text3); letter-spacing: 1px; text-transform: uppercase; font-family: var(--font-mono); margin-top: 2px; }

  .empty-state { padding: 32px; text-align: center; color: var(--text3); font-size: 13px; font-family: var(--font-mono); }

  .checkbox { width: 15px; height: 15px; cursor: pointer; accent-color: var(--cyan); }

  .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .section-title { font-family: var(--font-display); font-size: 16px; letter-spacing: 1px; color: var(--text); }

  .tag { display: inline-block; padding: 2px 7px; border-radius: 3px; font-size: 10px; font-family: var(--font-mono); }
  .tag-overdue { background: rgba(230,57,70,0.12); color: var(--red); }
  .tag-due-soon { background: rgba(251,133,0,0.12); color: var(--amber); }
  .tag-scheduled { background: rgba(0,180,216,0.1); color: var(--cyan); }
  .tag-completed { background: rgba(46,196,182,0.1); color: var(--green); }
</style>

<div class="app" id="app">
  <div class="sidebar" id="sidebar">
    <div class="logo">
      <div class="logo-title">MAROPS</div>
      <div class="logo-sub">Maritime Operations</div>
    </div>
    <div class="role-badge" id="roleBadge">
      <div class="role-label">Active Role</div>
      <div class="role-name" id="roleNameDisplay">Admin</div>
      <div class="role-toggle" onclick="toggleRole()">Switch to Crew →</div>
    </div>
    <nav class="nav" id="nav">
      <div class="nav-section">Operations</div>
      <div class="nav-item active" onclick="navigate('dashboard')"><i class="ti ti-dashboard nav-icon"></i>Dashboard</div>
      <div class="nav-item" onclick="navigate('ships')"><i class="ti ti-anchor nav-icon"></i>Fleet</div>
      <div class="nav-item" onclick="navigate('maintenance')"><i class="ti ti-tool nav-icon"></i>Maintenance</div>
      <div class="nav-item" onclick="navigate('drills')"><i class="ti ti-shield nav-icon"></i>Safety Drills</div>
      <div class="nav-section">Monitoring</div>
      <div class="nav-item" onclick="navigate('compliance')"><i class="ti ti-clipboard-check nav-icon"></i>Compliance</div>
      <div class="nav-item" onclick="navigate('crew')"><i class="ti ti-users nav-icon"></i>Crew Log</div>
      <div class="nav-item" onclick="navigate('alerts')"><i class="ti ti-alert-triangle nav-icon"></i>Alerts</div>
    </nav>
  </div>

  <div class="main">
    <div class="topbar">
      <div class="page-title" id="pageTitle">OPERATIONS DASHBOARD</div>
      <div class="topbar-right">
        <div class="badge-alert" onclick="navigate('alerts')">⚠ 3 CRITICAL ALERTS</div>
        <button class="btn btn-primary" id="topbarAction" onclick="handleTopAction()">+ Add Task</button>
      </div>
    </div>
    <div class="content" id="mainContent"></div>
  </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay" style="display:none;">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle">ADD TASK</div>
      <button class="btn btn-ghost btn-sm" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" id="modalSave" onclick="saveModal()">Save</button>
    </div>
  </div>
</div>

<script>

  page: 'dashboard',
  modalType: null,
  editId: null,

  ships: [

    { id: 2, shipId: 1, title: 'Fire Suppression System Check', category: 'Safety', priority: 'critical', status: 'overdue', due: '2026-04-30', assignee: 'Safety Officer Kim', notes: 'Monthly mandatory inspection' },

    { id: 6, shipId: 2, title: 'Fuel Tank Inspection', category: 'Engine', priority: 'high', status: 'overdue', due: '2026-04-20', assignee: 'Chief Engineer Patel', notes: 'Corrosion check' },
    { id: 7, shipId: 3, title: 'Cargo Hold Ventilation', category: 'Cargo', priority: 'medium', status: 'in-progress', due: '2026-05-20', assignee: 'Cargo Officer Singh', notes: 'Fan replacement' },

// ── helpers ──────────────────────────────────────────────
function getShip(id) { return state.ships.find(s => s.id === id); }
function statusPill(s) {
  const map = {
    'operational': ['pill-green','Operational'],
    'maintenance': ['pill-amber','Maintenance'],
    'at-risk': ['pill-red','At Risk'],
    'overdue': ['pill-red','Overdue'],
    'in-progress': ['pill-blue','In Progress'],
    'scheduled': ['pill-gray','Scheduled'],
    'completed': ['pill-green','Completed'],
  };
  const [cls, label] = map[s] || ['pill-gray', s];
  return `<span class="pill ${cls}"><span class="pill-dot"></span>${label}</span>`;
}
function priorityPill(p) {
  const map = { critical: 'pill-red', high: 'pill-amber', medium: 'pill-blue', low: 'pill-gray' };
  return `<span class="pill ${map[p]||'pill-gray'}">${p.toUpperCase()}</span>`;
}
function complianceColor(n) {
  if (n >= 85) return '#2ec4b6';
  if (n >= 65) return '#fb8500';
  return '#e63946';
}
function progressBar(pct, color) {
  return `<div class="progress-wrap"><div class="progress-bar"><div class="progress-fill" style="width:${pct}%;background:${color}"></div></div><span class="progress-pct">${pct}%</span></div>`;
}
function avatarColors(i) {
  const colors = ['rgba(0,180,216,0.2)','rgba(46,196,182,0.2)','rgba(244,162,97,0.2)','rgba(251,133,0,0.2)','rgba(230,57,70,0.15)'];
  const textColors = ['#00b4d8','#2ec4b6','#f4a261','#fb8500','#e63946'];
  return { bg: colors[i % colors.length], color: textColors[i % textColors.length] };
}
function initials(name) { return name.split(' ').slice(-2).map(n=>n[0]).join(''); }

function dueDateTag(due) {
  const d = new Date(due), now = new Date();
  const diff = Math.floor((d - now) / 86400000);
  if (diff < 0) return `<span class="tag tag-overdue">${Math.abs(diff)}d overdue</span>`;
  if (diff <= 7) return `<span class="tag tag-due-soon">Due in ${diff}d</span>`;
  return `<span class="tag tag-scheduled">${due}</span>`;
}

// ── navigation ──────────────────────────────────────────
function navigate(page) {
  state.page = page;
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  const map = { dashboard:'Dashboard',ships:'Fleet',maintenance:'Maintenance',drills:'Safety Drills',compliance:'Compliance',crew:'Crew Log',alerts:'Alerts' };
  document.querySelectorAll('.nav-item').forEach(el => {
    if (el.textContent.trim().toLowerCase().includes(page.toLowerCase().replace('_',''))) el.classList.add('active');
  });
  document.getElementById('pageTitle').textContent = (map[page]||page).toUpperCase();
  const actionMap = {
    dashboard: '+ Add Task', ships: '+ Add Ship', maintenance: '+ Add Task',
    drills: '+ Schedule Drill', compliance: 'Export Report', crew: null, alerts: 'Mark All Read'
  };
  const ab = document.getElementById('topbarAction');
  if (actionMap[page]) { ab.style.display=''; ab.textContent = actionMap[page]; }
  else ab.style.display='none';
  render();
}

function toggleRole() {
  state.role = state.role === 'admin' ? 'crew' : 'admin';
  document.getElementById('roleNameDisplay').textContent = state.role === 'admin' ? 'Admin' : 'Crew Member';
  document.querySelector('#roleBadge .role-toggle').textContent = state.role === 'admin' ? 'Switch to Crew →' : 'Switch to Admin →';
  render();
}

function handleTopAction() {
  const p = state.page;
  if (p === 'maintenance' || p === 'dashboard') openModal('maintenance');
  else if (p === 'drills') openModal('drill');
  else if (p === 'ships') openModal('ship');
}

// ── modals ──────────────────────────────────────────────

  const titles = { maintenance:'ADD MAINTENANCE TASK', drill:'SCHEDULE SAFETY DRILL', ship:'ADD VESSEL', log_participation:'LOG PARTICIPATION' };
  document.getElementById('modalTitle').textContent = titles[type] || 'FORM';
  document.getElementById('modalBody').innerHTML = getModalForm(type, id);
  document.getElementById('modalOverlay').style.display = 'flex';
}
function closeModal() { document.getElementById('modalOverlay').style.display = 'none'; }
function saveModal() {
  const type = state.modalType;

  else if (type === 'drill') saveDrill();
  else if (type === 'ship') saveShip();
  else if (type === 'log_participation') saveParticipation();
  closeModal(); render();
}

function saveMaintenance() {
  const v = (id) => document.getElementById(id)?.value || '';
  const shipId = parseInt(v('f_ship'));
  if (!v('f_title') || !shipId) return;
  state.maintenance.push({
    id: Date.now(), shipId, title: v('f_title'), category: v('f_cat'),
    priority: v('f_pri'), status: v('f_status'), due: v('f_due'),
    assignee: v('f_assign'), notes: v('f_notes')
  });
}
function saveDrill() {
  const v = (id) => document.getElementById(id)?.value || '';
  const shipId = parseInt(v('f_ship'));
  if (!v('f_title') || !shipId) return;
  state.drills.push({
    id: Date.now(), shipId, title: v('f_title'), type: v('f_type'),
    status: 'scheduled', date: v('f_date'), participants: [], required: parseInt(v('f_required'))||10
  });
}
function saveShip() {
  const v = (id) => document.getElementById(id)?.value || '';
  if (!v('f_name')) return;
  state.ships.push({
    id: Date.now(), name: v('f_name'), type: v('f_type'), flag: v('f_flag'),
    built: parseInt(v('f_built'))||2020, compliance: 100, crew: parseInt(v('f_crew'))||0, status: 'operational'
  });
}
function saveParticipation() {
  const drill = state.drills.find(d => d.id === state.editId);
  if (!drill) return;
  const checked = [...document.querySelectorAll('#modalBody input[type=checkbox]:checked')].map(cb => parseInt(cb.dataset.cid));
  drill.participants = checked;
  if (checked.length >= drill.required) drill.status = 'completed';
  else if (new Date(drill.date) < new Date()) drill.status = 'overdue';
  else drill.status = 'scheduled';
}

function updateTaskStatus(id, newStatus) {
  const t = state.maintenance.find(m => m.id === id);
  if (t) t.status = newStatus;
  render();
}

          </tbody>
        </table>
      </div>
    </div>`;
}

function renderDrills() {
  const isAdmin = state.role === 'admin';
  return `
    <div class="stats-row">
      ${[['Scheduled',state.drills.filter(d=>d.status==='scheduled').length],['Completed',state.drills.filter(d=>d.status==='completed').length],['Overdue',state.drills.filter(d=>d.status==='overdue').length]].map(([l,v])=>`
        <div class="stat-seg"><div class="stat-seg-val">${v}</div><div class="stat-seg-lbl">${l}</div></div>`).join('')}
    </div>
    <div class="panel">
      <div class="panel-header">
        <span class="panel-title">Safety Drills</span>
        ${isAdmin ? `<button class="btn btn-primary btn-sm" onclick="openModal('drill')">+ Schedule Drill</button>` : ''}
      </div>
      <div class="panel-body">
        <table>
          <thead><tr><th>Drill</th><th>Vessel</th><th>Type</th><th>Date</th><th>Participation</th><th>Status</th><th>Action</th></tr></thead>
          <tbody>
            ${state.drills.map(d => {
              const ship = getShip(d.shipId);
              const pct = d.required > 0 ? Math.round((d.participants.length / d.required) * 100) : 0;
              return `<tr>
                <td class="td-primary">${d.title}</td>
                <td>${ship?ship.name:'—'}</td>
                <td><span class="pill pill-blue">${d.type}</span></td>
                <td style="font-family:var(--font-mono);font-size:12px">${d.date}</td>
                <td style="min-width:150px">${progressBar(Math.min(pct,100), pct>=100?'var(--green)':pct>=50?'var(--amber)':'var(--red)')}
                  <div style="font-size:10px;color:var(--text3);margin-top:2px">${d.participants.length}/${d.required} crew</div></td>
                <td>${statusPill(d.status)}</td>
                <td>
                  ${isAdmin ? `<button class="btn btn-ghost btn-sm" onclick="openModal('log_participation',${d.id})">Log Crew</button>` : 
                    (d.status !== 'completed' ? `<button class="btn btn-primary btn-sm" onclick="selfLogDrill(${d.id})">I Participated</button>` : '<span style="color:var(--green);font-size:12px">✓ Done</span>')}
                </td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>
      </div>
    </div>`;
}

function selfLogDrill(drillId) {
  const drill = state.drills.find(d => d.id === drillId);
  if (!drill) return;
  const crewId = 1;
  if (!drill.participants.includes(crewId)) drill.participants.push(crewId);
  if (drill.participants.length >= drill.required) drill.status = 'completed';
  render();
}

function renderCompliance() {
  return `
    <div class="section-header">
      <div class="section-title">COMPLIANCE MONITOR</div>
      <button class="btn btn-ghost btn-sm" onclick="alert('Generating PDF report...')">⬇ Export PDF</button>
    </div>
    <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:16px;margin-bottom:20px">
      ${state.ships.map((s,i) => {
        const overdueM = state.maintenance.filter(m=>m.shipId===s.id&&m.status==='overdue').length;
        const totalM = state.maintenance.filter(m=>m.shipId===s.id).length;
        const drillsDone = state.drills.filter(d=>d.shipId===s.id&&d.status==='completed').length;
        const drillsTotal = state.drills.filter(d=>d.shipId===s.id).length;
        const overdueDrills = state.drills.filter(d=>d.shipId===s.id&&d.status==='overdue').length;
        const c = complianceColor(s.compliance);
        const risk = s.compliance < 60 ? 'HIGH RISK' : s.compliance < 80 ? 'MODERATE' : 'COMPLIANT';
        const riskColor = s.compliance < 60 ? 'var(--red)' : s.compliance < 80 ? 'var(--amber)' : 'var(--green)';
        return `<div class="panel" style="margin-bottom:0">
          <div class="panel-header">
            <span class="panel-title">${s.name}</span>
            <span style="font-family:var(--font-mono);font-size:11px;color:${riskColor};letter-spacing:1px">${risk}</span>
          </div>
          <div style="padding:16px">
            <div style="display:flex;align-items:center;gap:16px;margin-bottom:16px">
              <div>
                <div style="font-family:var(--font-display);font-size:48px;color:${c};line-height:1">${s.compliance}%</div>
                <div style="font-size:10px;color:var(--text3);font-family:var(--font-mono);letter-spacing:2px;margin-top:2px">COMPLIANCE</div>
              </div>
              <div style="flex:1">
                <div class="progress-bar" style="height:8px;margin-bottom:12px"><div class="progress-fill" style="width:${s.compliance}%;background:${c}"></div></div>
                <div style="font-size:12px;color:var(--text2)">${s.type} · ${s.flag} · ${s.crew} crew</div>
              </div>
            </div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
              <div style="background:rgba(255,255,255,0.03);border-radius:6px;padding:10px">
                <div style="font-size:10px;color:var(--text3);font-family:var(--font-mono);letter-spacing:1px;margin-bottom:4px">MAINTENANCE</div>
                <div style="font-size:13px;color:${overdueM>0?'var(--red)':'var(--text2)'}">${overdueM} overdue / ${totalM} total</div>
              </div>
              <div style="background:rgba(255,255,255,0.03);border-radius:6px;padding:10px">
                <div style="font-size:10px;color:var(--text3);font-family:var(--font-mono);letter-spacing:1px;margin-bottom:4px">DRILLS</div>
                <div style="font-size:13px;color:${overdueDrills>0?'var(--red)':'var(--text2)'}">${drillsDone} done / ${drillsTotal} total</div>
              </div>
            </div>
          </div>
        </div>`;
      }).join('')}
    </div>
    <div class="panel">
      <div class="panel-header"><span class="panel-title">Compliance Breakdown by Category</span></div>
      <div class="panel-body">
        <table>
          <thead><tr><th>Category</th><th>Total Tasks</th><th>Completed</th><th>Overdue</th><th>Completion Rate</th></tr></thead>
          <tbody>
            ${['Engine','Safety','Hull','Navigation','Electrical','Cargo'].map(cat => {
              const tasks = state.maintenance.filter(m=>m.category===cat);
              const done = tasks.filter(t=>t.status==='completed').length;
              const over = tasks.filter(t=>t.status==='overdue').length;
              const rate = tasks.length > 0 ? Math.round(done/tasks.length*100) : 0;
              return `<tr>
                <td class="td-primary"><span class="pill pill-gray">${cat}</span></td>
                <td>${tasks.length}</td>
                <td style="color:var(--green)">${done}</td>
                <td style="color:${over>0?'var(--red)':'var(--text3)'}">${over}</td>
                <td>${progressBar(rate, complianceColor(rate))}</td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>
      </div>
    </div>`;
}

function renderCrew() {
  const isAdmin = state.role === 'admin';
  return `
    <div class="section-header">
      <div class="section-title">CREW PARTICIPATION LOG</div>
      <div style="font-size:12px;color:var(--text3);font-family:var(--font-mono)">${state.crew.length} CREW MEMBERS</div>
    </div>
    <div class="panel">
      <div class="panel-header"><span class="panel-title">Crew Performance</span></div>
      <div class="panel-body">
        <table>
          <thead><tr><th>Crew Member</th><th>Role</th><th>Vessel</th><th>Drills Attended</th><th>Tasks Completed</th><th>Status</th></tr></thead>
          <tbody>
            ${state.crew.map((c,i) => {
              const ship = getShip(c.shipId);
              const pct = c.drillsRequired > 0 ? Math.round(c.drillsAttended/c.drillsRequired*100) : 100;
              const av = avatarColors(i);
              const compliance = pct >= 80 ? 'compliant' : pct >= 50 ? 'at-risk' : 'non-compliant';
              return `<tr>
                <td><div style="display:flex;align-items:center;gap:10px">
                  <div style="width:30px;height:30px;border-radius:50%;background:${av.bg};display:flex;align-items:center;justify-content:center;font-size:11px;color:${av.color};font-family:var(--font-mono);flex-shrink:0">${initials(c.name)}</div>
                  <span class="td-primary">${c.name}</span>
                </div></td>
                <td><span class="pill pill-gray">${c.role}</span></td>
                <td style="font-size:12px">${ship?ship.name:'—'}</td>
                <td>${progressBar(pct, complianceColor(pct))}
                  <div style="font-size:10px;color:var(--text3);margin-top:2px">${c.drillsAttended}/${c.drillsRequired} drills</div></td>
                <td style="font-family:var(--font-display);font-size:20px;color:var(--cyan)">${c.tasksCompleted}</td>
                <td>${statusPill(compliance==='compliant'?'completed':compliance==='at-risk'?'in-progress':'overdue')}</td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>
      </div>
    </div>`;
}

function renderAlerts() {
  const icons = { critical: 'ti-alert-triangle', warning: 'ti-alert-circle', info: 'ti-info-circle' };
  const iconColors = { critical: 'var(--red)', warning: 'var(--amber)', info: 'var(--cyan)' };
  const bgClass = { critical: 'alert-critical', warning: 'alert-warning', info: 'alert-info' };
  return `
    <div class="stats-row" style="margin-bottom:20px">
      <div class="stat-seg"><div class="stat-seg-val" style="color:var(--red)">${state.alerts.filter(a=>a.severity==='critical').length}</div><div class="stat-seg-lbl">Critical</div></div>
      <div class="stat-seg"><div class="stat-seg-val" style="color:var(--amber)">${state.alerts.filter(a=>a.severity==='warning').length}</div><div class="stat-seg-lbl">Warning</div></div>
      <div class="stat-seg"><div class="stat-seg-val" style="color:var(--cyan)">${state.alerts.filter(a=>a.severity==='info').length}</div><div class="stat-seg-lbl">Info</div></div>
      <div class="stat-seg"><div class="stat-seg-val">${state.alerts.length}</div><div class="stat-seg-lbl">Total</div></div>
    </div>
    <div class="panel">
      <div class="panel-header"><span class="panel-title">Active Alerts</span>
        <button class="btn btn-ghost btn-sm" onclick="state.alerts=state.alerts.filter(a=>a.severity==='critical');render()">Dismiss Non-Critical</button>
      </div>
      ${state.alerts.map(a => `
        <div class="alert-item">
          <div class="alert-icon-wrap ${bgClass[a.severity]}">
            <i class="ti ${icons[a.severity]}" style="color:${iconColors[a.severity]};font-size:16px"></i>
          </div>
          <div style="flex:1">
            <div class="alert-title">${a.title}</div>
            <div class="alert-desc">${a.desc}</div>
            <div class="alert-time">${a.time}</div>
          </div>
          <button class="btn btn-ghost btn-sm" onclick="dismissAlert(${a.id})">Dismiss</button>
        </div>`).join('')}
    </div>`;
}

function dismissAlert(id) {
  state.alerts = state.alerts.filter(a => a.id !== id);
  render();
}

render();
</script>
